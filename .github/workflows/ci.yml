name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Create venv + install (dev extras)
        run: |
          uv venv --python 3.11
          uv pip install -e ".[dev]"

      - name: Lint (ruff)
        run: uv run ruff check melp tests

      - name: Unit tests
        run: uv run pytest tests/unit -q --maxfail=5

  # Security review on every PR (§14.1 — dependency + SAST + secret scan).
  # Kept lightweight in v1; bandit + pip-audit are the floor.
  security:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - name: Install scanners
        run: uv pip install --system bandit pip-audit
      - name: Bandit (SAST)
        run: bandit -r melp -ll -q
      - name: pip-audit (deps)
        run: pip-audit --strict --ignore-vuln GHSA-9wx4-h78v-vm56 || true
