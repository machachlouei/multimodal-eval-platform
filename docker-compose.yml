services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: melp
      POSTGRES_PASSWORD: melp
      POSTGRES_DB: melp
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U melp"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: melp
      MINIO_ROOT_PASSWORD: melpmelpmelp
    ports: ["9000:9000", "9001:9001"]
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 melp melpmelpmelp;
      mc mb -p local/melp-artifacts || true;
      mc mb -p local/melp-datasets  || true;
      mc mb -p local/melp-results   || true;
      mc anonymous set download local/melp-artifacts;
      exit 0;
      "

  temporal:
    image: temporalio/auto-setup:1.22
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: melp
      POSTGRES_PWD: melp
      POSTGRES_SEEDS: postgres
      DYNAMIC_CONFIG_FILE_PATH: /etc/temporal/config/dynamicconfig/development-sql.yaml
    depends_on:
      postgres:
        condition: service_healthy
    ports: ["7233:7233"]

  # Stubbed LLM gateway for dev — returns deterministic judge responses.
  llm-gateway-stub:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ./infra/llm-stub:/app
    command: python server.py
    ports: ["9100:9100"]

volumes:
  pgdata:
  miniodata:
